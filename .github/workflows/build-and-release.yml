name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build-mac:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - run: yarn install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: |
            ## Install

            | Platform | Download |
            |----------|----------|
            | macOS | `.dmg` below |
            | Windows | `.exe` installer below |

            ### macOS — first launch
            The app is not code-signed. After dragging it to Applications, run once in Terminal:
            ```bash
            xattr -cr /Applications/Performer.app
            ```
          releaseDraft: false
          prerelease: false

  build-win:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - run: yarn install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: |
            ## Install

            | Platform | Download |
            |----------|----------|
            | macOS | `.dmg` below |
            | Windows | `.exe` installer below |

            ### macOS — first launch
            The app is not code-signed. After dragging it to Applications, run once in Terminal:
            ```bash
            xattr -cr /Applications/Performer.app
            ```
          releaseDraft: false
          prerelease: false
